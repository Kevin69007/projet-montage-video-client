services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Job files (uploads + outputs) persisted on host
      - ./jobs:/app/jobs
    env_file:
      - .env
    environment:
      - FFMPEG_PATH=ffmpeg
      - FONTS_DIR=/app/pipeline/fonts
      - NODE_ENV=production
    restart: unless-stopped
